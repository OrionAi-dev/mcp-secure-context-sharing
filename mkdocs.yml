site_name: AstroSpec
site_description: AstroSpec — specs, runtime, and integrations
site_url: https://orionai-dev.github.io/AstroSpec

repo_url: https://github.com/OrionAi-dev/AstroSpec
repo_name: OrionAi-dev/AstroSpec
edit_uri: ""
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - redirects:
      redirect_maps:
        "api/schema/modules.md": "api/schema/README.md"
        "api/runtime/modules.md": "api/runtime/README.md"
        "api/cli/modules.md": "api/cli/README.md"
        "api/mcp-profile/modules.md": "api/mcp-profile/README.md"
        "api/kit/modules.md": "api/kit/README.md"
        "api/retrieval-profile/modules.md": "api/retrieval-profile/README.md"
        "api/integrations/mindql-core/modules.md": "api/integrations/mindql-core/README.md"
        "api/integrations/mindgraphql-core/modules.md": "api/integrations/mindgraphql-core/README.md"
        "spec-bdd-context-turn.md": "astrospec/context-turn.md"
        "astrospec/implementations/@software/README.md": "integrations/bdd/@software/README.md"
        "astrospec/implementations/@software/template.md": "integrations/bdd/@software/template.md"
        "astrospec/implementations/@software/examples.md": "integrations/bdd/@software/template.md"
        "astrospec/implementations/bdd/astrospec.core/README.md": "integrations/bdd/astrospec.core/README.md"
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
      exclude:
        - api/**

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Start here: index.md

  - AstroSpec Spec:
      - Overview: astrospec/spec-overview.md
      - Adoption Charter: astrospec/adoption-charter.md
      - Language: astrospec/spec-language.md
      - Schema: astrospec/spec-schema.md
      - Validation: astrospec/spec-validation.md
      - API: astrospec/api.md
      - Context Turn: astrospec/context-turn.md
      - Protocol: astrospec/protocol.md
      - Templates: astrospec/templates.md
      - TypeScript: astrospec/typescript.md
      - Verification: astrospec/verification.md
      - Examples: astrospec/spec-examples.md
      - Quickstart: astrospec/quickstart.md
      - Consumer Quickstart (Schema): astrospec/consumer-quickstart-schema.md
      - Consumer Quickstart (MCP): astrospec/consumer-quickstart-mcp.md
      - Scope Migration: astrospec/migration-orionai-to-astrospec-scope.md
      - Extension Registry: astrospec/extension-registry.md
      - Roadmap: astrospec/roadmap.md
      - Whitepaper: astrospec/whitepaper.md

  - Governance:
      - RFC Process: governance/rfc-process.md
      - Compatibility Policy: governance/compatibility-policy.md
      - Release Policy: governance/release-policy.md
      - Maintainers: governance/maintainers.md
      - RFC Template: governance/rfcs/RFC-000-template.md

  - Integrations:
      - BDD:
          - "@software":
              - Overview: integrations/bdd/@software/README.md
              - Adapters:
                  - Behat: integrations/bdd/@software/adapters/behat-mapper.md
                  - Behave: integrations/bdd/@software/adapters/behave-mapper.md
                  - Context Turn Mapper: integrations/bdd/@software/adapters/context-turn-mapper.md
                  - Cucumber: integrations/bdd/@software/adapters/cucumber-mapper.md
                  - JBehave: integrations/bdd/@software/adapters/jbehave-mapper.md
                  - Jest: integrations/bdd/@software/adapters/jest-mapper.md
                  - Karate: integrations/bdd/@software/adapters/karate-mapper.md
                  - Robot: integrations/bdd/@software/adapters/robot-mapper.md
                  - SpecFlow: integrations/bdd/@software/adapters/specflow-mapper.md
              - Template: integrations/bdd/@software/template.md
          - astrospec.core:
              - Overview: integrations/bdd/astrospec.core/README.md

  - API Reference:
      - Core:
          - schema: api/schema/README.md
          - runtime: api/runtime/README.md
          - cli: api/cli/README.md
          - mcp-profile: api/mcp-profile/README.md
          - kit: api/kit/README.md
          - retrieval-profile: api/retrieval-profile/README.md
      - Integrations:
          - mindql-core: api/integrations/mindql-core/README.md
          - mindgraphql-core: api/integrations/mindgraphql-core/README.md

  - Legacy:
      - Historical BDD Core Alias: spec-bdd-astrospec-core.md
